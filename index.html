<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Chat - BinTV</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Reset all margins and paddings for true full screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a; /* Matches your dark theme */
            display: flex;
            flex-direction: column;
        }

        /* Header bar for the "Live Chat" text */
        .chat-title-bar {
            width: 100%;
            padding: 10px 15px;
            background: #020617;
            border-bottom: 1px solid #1e293b;
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        /* Chat container takes all remaining space */
        #chatango-container {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        /* Ensure the iframe inside Chatango fills the div */
        #chatango-container iframe {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div class="chat-title-bar">
        <span style="color: #3c86ff;">●</span> Live Chat
    </div>

    <div id="chatango-container"></div>

    <script>
        function initChat() {
            const container = document.getElementById('chatango-container');
            const script = document.createElement('script');
            script.id = "cid0020000423780936295";
            script.async = true;
            script.src = "//st.chatango.com/js/gz/emb.js";
            
            // Configuration for full-screen integration
            const config = {
                "handle": "bintvchat",
                "arch": "js",
                "styles": {
                    "a": "0f172a", // Background color
                    "b": 100,      // Opacity
                    "c": "f8fafc", // Text color
                    "d": "f8fafc",
                    "e": "0f172a",
                    "g": "f8fafc",
                    "k": "0f172a",
                    "l": "1e293b", // Border/Line color
                    "m": "0f172a",
                    "n": "f8fafc",
                    "p": "11.7",
                    "q": "0f172a",
                    "r": 100, 
                    "t": 0, 
                    "surl": 0, 
                    "allowpm": 0, 
                    "cnrs": "1"
                }
            };
            
            script.innerHTML = JSON.stringify(config);
            container.appendChild(script);
        }

        window.onload = initChat;
    </script>
</body>
</html>
