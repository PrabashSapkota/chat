    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --surface-solid: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --yellow: #ffb800;
            --accent: #ffb800;
            --border: #1e293b;
            --header-bg: #020617;
            --input-bg: #0f172a;
            --input-border: #1e293b;
            --max-site-width: 100%; /* Changed to fill screen */
            --brand: #3c86ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header styling remains for navigation */
        .sticky-wrapper { background: var(--header-bg); border-bottom: 1px solid var(--border); }
        .header-content { max-width: 100%; margin: 0 auto; padding: 0 20px; height: 60px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text-main); }
        .logo img { height: 30px; }
        .logo span { font-weight: 800; font-size: 1.2rem; text-transform: uppercase; }
        
        /* Main Layout - Focused on Player and Chat */
        .player-container { flex: 1; display: flex; overflow: hidden; padding: 0; }
        .player-layout { display: flex; width: 100%; height: 100%; }

        /* Video Section */
        .video-main-column { flex: 1; display: flex; flex-direction: column; background: #000; }
        .video-player-container { flex: 1; position: relative; }
        .video-player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Chat Section - Full Height */
        .live-chat-section { width: 350px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-header { padding: 12px 15px; background: var(--surface-solid); border-bottom: 1px solid var(--border); font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        #chatango-container { width: 100%; flex: 1; }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .player-layout { flex-direction: column; overflow-y: auto; }
            .video-main-column { flex: none; aspect-ratio: 16/9; }
            .live-chat-section { width: 100%; height: 500px; flex: 1; }
            body { overflow: auto; }
        }

        /* Hidden Elements as requested (remove everything else) */
        footer, .theme-float, .video-title-section, .action-bar { display: none !important; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 5000; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 90%; max-width: 500px; }
    </style>
</head>
<body data-theme="dark">
    <div class="sticky-wrapper">
        <header class="header-content">
            <a href="https://bintv.net/" class="logo">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhsQsag_KQPokaomZsgDV4fiXQ_fi494N6wV8cwKyQQuhSnOh1pAl4lV2Ur-yHCG6IFBimoeWaZKiOTQyyEmfYLetghJRbhyoTHZuzfbZ9VOWZV5aNE4L4akyYmk5D1sB-QLzVQLy200JxziBg0Wwetdxb0Ybf7oqv4R1W8t49rsYLsFkLHZuNPL42I8Q/s512/letter-b.png" alt="Logo">
                <span>BINTV</span>
            </a>
            <div class="text-xs text-slate-400 font-medium" id="displayTitle">Live Sports Stream</div>
        </header>
    </div>

    <main class="player-container">
        <div class="player-layout">
            <div class="video-main-column">
                <div class="video-player-container">
                    <iframe id="mainVideoPlayer" src="about:blank" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
            
            <div class="live-chat-section">
                <div class="chat-header">
                    <i class="fas fa-comment-alt" style="color: var(--brand);"></i> 
                    <span>Live Chat</span>
                </div>
                <div id="chatango-container"></div>
            </div>
        </div>
    </main>

    <script>
        let shortId = 'default';
        
        function initChat(theme) {
            const container = document.getElementById('chatango-container');
            container.innerHTML = '';
            
            const script = document.createElement('script');
            script.id = "cid0020000423780936295";
            script.async = true;
            script.src = "//st.chatango.com/js/gz/emb.js";
            script.style.width = "100%";
            script.style.height = "100%";
            
            const isDark = theme === 'dark';
            const config = {
                "handle": "bintvchat",
                "arch": "js",
                "styles": {
                    "a": "0f172a", "b": 100, "c": "f8fafc", "d": "f8fafc",
                    "e": "0f172a", "g": "f8fafc", "k": "0f172a", "l": "1e293b",
                    "m": "0f172a", "n": "f8fafc", "p": "11.7", "q": "0f172a",
                    "r": 100, "t": 0, "surl": 0, "allowpm": 0, "cnrs": "1"
                }
            };
            script.innerHTML = JSON.stringify(config);
            container.appendChild(script);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const src = params.get('src');
            const title = params.get('title');
            
            if (src) {
                document.getElementById('mainVideoPlayer').src = src;
                shortId = src.length >= 30 ? src.slice(-50) : btoa(src).slice(0, 30);
            }
            if (title) {
                const cleanTitle = decodeURIComponent(title);
                document.getElementById('displayTitle').innerText = cleanTitle;
                document.title = cleanTitle + " - BINTV";
            }
            initChat('dark');
        };
    </script>
</body>
